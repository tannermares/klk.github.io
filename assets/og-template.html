<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>klk — Open Graph card source</title>
    <!-- Source for assets/og-image.png. Not linked from the site; it exists so the card
         can be regenerated when the wordmark, palette or tagline changes. Render it at
         exactly 1200x630 (the Open Graph standard) and screenshot the viewport:

           python3 -m http.server 8765
           open http://localhost:8765/assets/og-template.html

         Type is sized in px against that fixed canvas rather than in rem or vw — the
         canvas never reflows, so absolute units are the honest choice here. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Tokens are duplicated from styles.css rather than imported: this file must render
         standalone at a fixed size, and it deliberately pins the light palette so the card
         looks the same regardless of the rendering machine's theme. */
      :root {
        --paper: #faf8f3;
        --surface: #f3efe7;
        --ink: #191612;
        --ink-muted: #7a7065;
        --rule: rgba(25, 22, 18, 0.11);
        --pine: #4f7d66;
        --clay: #b5654a;
        --indigo: #4c6fa5;
        --heading: 'Fira Sans', ui-sans-serif, system-ui, sans-serif;
        --body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial,
          sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 1200px;
        height: 630px;
        background: var(--paper);
        color: var(--ink);
        font-family: var(--body);
        display: flex;
        align-items: center;
        overflow: hidden;
      }

      .card {
        display: flex;
        align-items: center;
        gap: 84px;
        padding: 0 88px;
        width: 100%;
      }

      .copy {
        flex: 1;
      }

      .mark {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 34px;
      }

      .wordmark {
        font-family: var(--heading);
        font-weight: 600;
        font-size: 92px;
        letter-spacing: -0.03em;
        line-height: 1;
      }

      h1 {
        font-family: var(--heading);
        font-weight: 600;
        font-size: 46px;
        line-height: 1.22;
        letter-spacing: -0.015em;
        margin-bottom: 26px;
        max-width: 15ch;
      }

      p {
        font-size: 25px;
        line-height: 1.5;
        color: var(--ink-muted);
        max-width: 26ch;
      }

      .domain {
        position: absolute;
        bottom: 54px;
        left: 88px;
        font-size: 21px;
        color: var(--ink-muted);
        letter-spacing: 0.02em;
      }

      /* The stack of klk rows echoes the app's klks list — which is the one place the six
         hues legitimately appear, since there each bar identifies a specific klk. */
      .klks {
        width: 392px;
        background: var(--surface);
        border: 1px solid var(--rule);
        border-radius: 26px;
        padding: 30px 32px;
      }

      .klk-row {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 17px 0;
      }

      .klk-row + .klk-row {
        border-top: 1px solid var(--rule);
      }

      .bar {
        width: 5px;
        height: 40px;
        border-radius: 3px;
        flex-shrink: 0;
      }

      .name {
        font-family: var(--heading);
        font-weight: 600;
        font-size: 23px;
        line-height: 1.25;
      }

      .members {
        font-size: 17px;
        color: var(--ink-muted);
        margin-top: 3px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="copy">
        <div class="mark">
          <svg width="76" height="76" fill="var(--pine)" viewBox="0 0 1024 1024">
            <defs>
              <clipPath id="shutter-rim" clipPathUnits="userSpaceOnUse">
                <circle cx="512" cy="512" r="369" />
              </clipPath>
            </defs>
            <path
              clip-path="url(#shutter-rim)"
              fill-rule="nonzero"
              d="M 143.00 512.00 A 369.00 369.00 0 1 1 881.00 512.00 A 369.00 369.00 0 1 1 143.00 512.00 Z M 177.00 512.00 A 335.00 335.00 0 1 0 847.00 512.00 A 335.00 335.00 0 1 0 177.00 512.00 Z M 520.50 347.28 L 900.24 566.52 L 883.24 595.96 L 503.50 376.72 Z M 658.90 437.00 L 658.90 875.48 L 624.90 875.48 L 624.90 437.00 Z M 650.40 601.72 L 270.67 820.96 L 253.67 791.52 L 633.40 572.28 Z M 503.50 676.72 L 123.76 457.48 L 140.76 428.04 L 520.50 647.28 Z M 365.10 587.00 L 365.10 148.52 L 399.10 148.52 L 399.10 587.00 Z M 373.60 422.28 L 753.33 203.04 L 770.33 232.48 L 390.60 451.72 Z"
            />
          </svg>
          <span class="wordmark">klk</span>
        </div>
        <h1>Share your life with the people actually in it.</h1>
        <p>A private, invite-only place for photos and video.</p>
      </div>

      <div class="klks">
        <div class="klk-row">
          <span class="bar" style="background: var(--clay)"></span>
          <div>
            <div class="name">Family</div>
            <div class="members">6 members</div>
          </div>
        </div>
        <div class="klk-row">
          <span class="bar" style="background: var(--indigo)"></span>
          <div>
            <div class="name">Cabin trip</div>
            <div class="members">4 members</div>
          </div>
        </div>
        <div class="klk-row">
          <span class="bar" style="background: var(--pine)"></span>
          <div>
            <div class="name">Book club</div>
            <div class="members">9 members</div>
          </div>
        </div>
      </div>
    </div>

    <div class="domain">klkapp.com</div>
  </body>
</html>
